services:
  # Redis Cache & Broker (INTERNAL ONLY - no host exposure)
  redis:
    image: redis:7.0.9-alpine
    command: redis-server --bind 0.0.0.0 --requirepass ${REDIS_PASSWORD:-redis_secret}
    container_name: deliveru-redis
    profiles:
      - infra
    expose:
      - "6379"
    ports:
      - "127.0.0.1:6379:6379"
    networks:
      - deliveru-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # MinIO Object Storage (INTERNAL ONLY - no host exposure)
  minio:
    image: minio/minio:RELEASE.2024-01-18T22-51-28Z
    container_name: deliveru-minio
    command: server /data --console-address ":9001"
    profiles:
      - storage
    environment:
      - MINIO_ROOT_USER=${MINIO_ROOT_USER:-minioadmin}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD:-minioadmin}
    expose:
      - "9000"
      - "9001"
    ports:
      - "127.0.0.1:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - deliveru_minio_data:/data
    networks:
      - deliveru-network
    healthcheck:
      test: ["CMD-SHELL", "timeout 1 bash -c '</dev/tcp/localhost/9000' || exit 1"]
      interval: 30s
      timeout: 20s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # MinIO bucket initialization (NO public anonymous access)
  minio-init:
    image: minio/mc:RELEASE.2024-01-18T07-03-39Z
    container_name: deliveru-minio-init
    profiles:
      - storage
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      sleep 5;
      /usr/bin/mc alias set myminio http://minio:9000 $${MINIO_ROOT_USER:-minioadmin} $${MINIO_ROOT_PASSWORD:-minioadmin};
      /usr/bin/mc mb myminio/uploads --ignore-existing;
      exit 0;
      "
    networks:
      - deliveru-network

  # PostgreSQL Database (INTERNAL ONLY - no host exposure)
  postgres:
    image: postgres:15-alpine
    container_name: deliveru-postgres
    profiles:
      - infra
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-root}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-password}
      - POSTGRES_DB=${POSTGRES_DB:-app}
      - POSTGRES_INITDB_ARGS=--auth-host=scram-sha-256
    volumes:
      - deliveru_pg_data:/var/lib/postgresql/data
    expose:
      - "5432"
    ports:
      - "127.0.0.1:5432:5432"
    networks:
      - deliveru-network
    restart: unless-stopped
    shm_size: 128mb
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-root} -d ${POSTGRES_DB:-app}"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # PgBouncer Connection Pooler (INTERNAL ONLY)
  pgbouncer:
    container_name: deliveru-pgbouncer
    image: edoburu/pgbouncer:latest
    profiles:
      - infra
    environment:
      - DATABASE_URL=${PGBOUNCER_DATABASE_URL:-postgresql+asyncpg://root:password@postgres:5432/app}
      - AUTH_TYPE=scram-sha-256
      - POOL_MODE=session
      - SERVER_RESET_QUERY=DISCARD ALL
      - MAX_CLIENT_CONN=500
      - DEFAULT_POOL_SIZE=50
      - IGNORE_STARTUP_PARAMETERS=extra_float_digits,statement_timeout,idle_in_transaction_session_timeout
    expose:
      - "6432"
    ports:
      - "127.0.0.1:6432:6432"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - deliveru-network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 128M
          cpus: "0.25"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Backend Application
  app:
    build:
      context: ./backend
      dockerfile: Dockerfile
    command: /app/scripts/start.sh
    container_name: deliveru-app
    profiles:
      - app
    env_file:
      - ${APP_ENV_FILE:-.env}
    environment:
      - DATABASE_URL=${DOCKER_DATABASE_URL:-postgresql+asyncpg://root:password@pgbouncer:5432/app}
      - REDIS_HOST=${DOCKER_REDIS_HOST:-redis}
      - REDIS_PORT=${DOCKER_REDIS_PORT:-6379}
      - REDIS_URL=${DOCKER_REDIS_URL:-redis://:redis_secret@redis:6379}
      - MINIO_ENDPOINT=${DOCKER_MINIO_ENDPOINT:-minio:9000}
    ports:
      - "${BACKEND_PORT:-8504}:8504"
    depends_on:
      pgbouncer:
        condition: service_started
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - deliveru-network
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 1G
          cpus: "2"
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"

  # TaskIQ Background Job Worker
  worker:
    container_name: deliveru-worker
    build:
      context: ./backend
      dockerfile: Dockerfile
    profiles:
      - worker
    env_file:
      - ${APP_ENV_FILE:-.env}
    environment:
      - DATABASE_URL=${DOCKER_DATABASE_URL:-postgresql+asyncpg://root:password@pgbouncer:5432/app}
      - REDIS_HOST=${DOCKER_REDIS_HOST:-redis}
      - REDIS_PORT=${DOCKER_REDIS_PORT:-6379}
      - REDIS_URL=${DOCKER_REDIS_URL:-redis://:redis_secret@redis:6379}
      - MINIO_ENDPOINT=${DOCKER_MINIO_ENDPOINT:-minio:9000}
    command: taskiq worker backend.services.runtime.broker:broker backend.modules.jobs --max-async-tasks 10 --ack-type when_executed
    depends_on:
      pgbouncer:
        condition: service_started
      postgres:
        condition: service_healthy
      app:
        condition: service_started
    networks:
      - deliveru-network
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "1"
    logging:
      driver: "json-file"
      options:
        max-size: "50m"
        max-file: "5"
    healthcheck:
      disable: true

  # Frontend Application
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ""
    container_name: deliveru-frontend
    profiles:
      - web
    ports:
      - "${FRONTEND_PORT:-8503}:8503"
    depends_on:
      - app
    networks:
      - deliveru-network
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:8503/"]
      interval: 30s
      timeout: 3s
      start_period: 5s
      retries: 3
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          memory: 256M
          cpus: "0.5"
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

networks:
  deliveru-network:
    driver: bridge
    name: deliveru-network

volumes:
  deliveru_pg_data:
    name: deliveru_pg_data
  deliveru_minio_data:
    name: deliveru_minio_data
